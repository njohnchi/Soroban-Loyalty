apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: soroban-loyalty
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: backend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: backend
          image: ghcr.io/dev-odun-oss/soroban-loyalty-backend:latest
          ports:
            - containerPort: 3001
          envFrom:
            - configMapRef:
                name: soroban-loyalty-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: soroban-loyalty-secrets
                  key: DATABASE_URL
            - name: REWARDS_CONTRACT_ID
              valueFrom:
                secretKeyRef:
                  name: soroban-loyalty-secrets
                  key: REWARDS_CONTRACT_ID
            - name: CAMPAIGN_CONTRACT_ID
              valueFrom:
                secretKeyRef:
                  name: soroban-loyalty-secrets
                  key: CAMPAIGN_CONTRACT_ID
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: soroban-loyalty
spec:
  selector:
    app: backend
  ports:
    - port: 80
      targetPort: 3001
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: soroban-loyalty
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
