# Secrets are managed externally (AWS Secrets Manager / Vault).
# Apply this template after substituting values via your secrets operator
# or CI/CD pipeline (e.g. External Secrets Operator, Sealed Secrets).
# Never commit real values to source control.
apiVersion: v1
kind: Secret
metadata:
  name: soroban-loyalty-secrets
  namespace: soroban-loyalty
type: Opaque
stringData:
  DATABASE_URL: "postgres://loyalty:CHANGE_ME@postgres:5432/soroban_loyalty"
  POSTGRES_PASSWORD: "CHANGE_ME"
  REWARDS_CONTRACT_ID: ""
  CAMPAIGN_CONTRACT_ID: ""
  TOKEN_CONTRACT_ID: ""
