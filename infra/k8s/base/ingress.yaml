apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: soroban-loyalty-ingress
  namespace: soroban-loyalty
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - soroban-loyalty.example.com
        - api.soroban-loyalty.example.com
      secretName: soroban-loyalty-tls
  rules:
    - host: soroban-loyalty.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
    - host: api.soroban-loyalty.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 80
