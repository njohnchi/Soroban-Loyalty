# Blue environment — the currently-live slot.
# Traffic is routed here when the active-slot Service selector is "blue".
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-blue
  namespace: soroban-loyalty
  labels:
    app: backend
    slot: blue
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
      slot: blue
  template:
    metadata:
      labels:
        app: backend
        slot: blue
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: backend
          image: ghcr.io/dev-odun-oss/soroban-loyalty-backend:blue
          ports:
            - containerPort: 3001
          envFrom:
            - configMapRef:
                name: soroban-loyalty-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: soroban-loyalty-secrets
                  key: DATABASE_URL
            - name: REWARDS_CONTRACT_ID
              valueFrom:
                secretKeyRef:
                  name: soroban-loyalty-secrets
                  key: REWARDS_CONTRACT_ID
            - name: CAMPAIGN_CONTRACT_ID
              valueFrom:
                secretKeyRef:
                  name: soroban-loyalty-secrets
                  key: CAMPAIGN_CONTRACT_ID
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-blue
  namespace: soroban-loyalty
  labels:
    app: frontend
    slot: blue
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
      slot: blue
  template:
    metadata:
      labels:
        app: frontend
        slot: blue
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: frontend
          image: ghcr.io/dev-odun-oss/soroban-loyalty-frontend:blue
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: soroban-loyalty-config
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
