# ExternalSecret — syncs the AWS Secrets Manager secret into a Kubernetes Secret.
# Requires External Secrets Operator (https://external-secrets.io) installed in the cluster.
#
# Install ESO:
#   helm repo add external-secrets https://charts.external-secrets.io
#   helm install external-secrets external-secrets/external-secrets -n external-secrets --create-namespace
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secrets-manager
  namespace: soroban-loyalty
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: soroban-loyalty-sa   # IRSA service account with read-secret policy
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: soroban-loyalty-secrets
  namespace: soroban-loyalty
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: soroban-loyalty-secrets
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: soroban-loyalty/production
