groups:
  - name: soroban-loyalty
    rules:
      - alert: HighErrorRate
        expr: |
          rate(http_requests_total{status=~"5.."}[5m])
          / rate(http_requests_total[5m]) > 0.01
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Error rate > 1%"
          description: "HTTP 5xx error rate is {{ $value | humanizePercentage }} over the last 5 minutes."
          runbook_url: "docs/runbooks/operations.md#1-service-restart"

      - alert: HighP99Latency
        expr: |
          histogram_quantile(0.99, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "p99 latency > 2s"
          description: "p99 request latency is {{ $value }}s."
          runbook_url: "docs/runbooks/operations.md#1-service-restart"

      - alert: IndexerLag
        expr: indexer_lag_blocks > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Indexer lag > 100 blocks"
          description: "Indexer is {{ $value }} blocks behind the chain tip."
          runbook_url: "docs/runbooks/operations.md#2-indexer-replay"
