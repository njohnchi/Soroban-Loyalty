global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: "soroban-loyalty-backend"
    static_configs:
      - targets: ["backend:3001"]
    metrics_path: /metrics
