name: Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint, Type-check & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: loyalty
          POSTGRES_PASSWORD: loyalty
          POSTGRES_DB: loyalty
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://loyalty:loyalty@localhost:5432/loyalty
      TEST_DATABASE_URL: postgresql://loyalty:loyalty@localhost:5432/loyalty_test

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Apply DB schema
        run: psql $DATABASE_URL -f ../database/schema.sql

      - name: Create dedicated integration test database
        run: psql $DATABASE_URL -c "CREATE DATABASE loyalty_test;"

      - name: Apply test DB schema
        run: psql $TEST_DATABASE_URL -f ../database/schema.sql

      - name: Run unit tests
        run: npm test -- --ci --coverage

      - name: Run integration tests
        run: npm run test:integration -- --ci

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-coverage
          path: backend/coverage/
          retention-days: 7
